services:

  # ───────────────────────────────────────────────
  # React admin dashboard (Vite dev server)
  # ───────────────────────────────────────────────
  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./admin-ui:/app
      - /app/node_modules            # preserve node_modules from image build
    environment:
      - VITE_API_URL=http://localhost:5155
    depends_on:
      - api
    restart: unless-stopped

  # ───────────────────────────────────────────────
  # PostgreSQL — primary database for Compose (Phase 5). SQLite remains a documented rollback path.
  # ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiemployee-postgres
    environment:
      POSTGRES_DB: aiemployee
      POSTGRES_USER: aiemployee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiemployee -d aiemployee"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

  # ───────────────────────────────────────────────
  # Python AI service (FastAPI + Uvicorn)
  # ───────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gpt-oss:120b-cloud}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-120}
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - backend

  # ───────────────────────────────────────────────
  # .NET API (ASP.NET Core 10) — published image, no source bind mount.
  # Avoids dotnet watch + PollingDirectoryWatcher duplicate-key crashes.
  # For bind-mounted development see Dockerfile.dev + comment below (avoid dotnet watch in Docker).
  # ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: src/AiEmployee.Api/Dockerfile
    ports:
      - "5155:5155"
    volumes:
      # Not used when Database__Provider=Npgsql. Kept for fast rollback to Sqlite (override env + optional sqlite file).
      - api-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5155
      - Ai__BaseUrl=http://ai-service:8000
      # Default in Compose: PostgreSQL (hostname "postgres"). Override in .env to revert to SQLite.
      - Database__Provider=${Database__Provider:-Npgsql}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=aiemployee;Username=aiemployee;Password=${POSTGRES_PASSWORD:-postgres}
      # SQLite fallback (example env lines for docker-compose.override.yml):
      #   - Database__Provider=Sqlite
      #   - ConnectionStrings__DefaultConnection=Data Source=/app/data/aiemployee.db
      # If using Sqlite without Postgres, remove postgres from depends_on in the override.
      - Admin__ApiKey=${ADMIN_API_KEY:-your-secret-key}
      # Telegram webhooks: set to your public HTTPS origin (ngrok, tunnel, or prod domain). No trailing slash.
      # Example (uncomment and set): - App__PublicBaseUrl=https://abcd-1234.ngrok-free.app
      # Production: use ASPNETCORE_ENVIRONMENT=Production and HTTPS-only PublicBaseUrl (see docs/CONFIGURATION.md).
      # Telegram: prefer BotIntegrations (ExternalId) per bot; optional legacy: Telegram__BotToken=... in override file.
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend

  # Bind-mounted API + hot reload: run on the host (`dotnet watch run --project src/AiEmployee.Api`)
  # or build `src/AiEmployee.Api/Dockerfile.dev` manually — do not combine with this `api` service on the same port.

  # ───────────────────────────────────────────────
  # Ollama LLM inference server
  # ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - backend
    # Uncomment for NVIDIA GPU support (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ───────────────────────────────────────────────
  # ngrok tunnel (exposes .NET API publicly)
  # ───────────────────────────────────────────────
  ngrok:
    image: ngrok/ngrok:latest
    ports:
      - "4040:4040"                  # ngrok web dashboard
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http api:5155
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - tunnel                       # only starts with: docker compose --profile tunnel up
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  ollama-data:
  nuget-cache:
  api-data:
  pg-data:
